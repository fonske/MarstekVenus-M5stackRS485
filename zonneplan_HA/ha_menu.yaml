          in_header: false
        data_generator: |
          return entity.attributes.detailedForecast.map((entry) => {
                return [new Date(entry.period_start), entry.pv_estimate10];
              });
      - entity: sensor.sma_totaal_kw
        yaxis_id: header_only
        name: Today Actual
        stroke_width: 2
        color: Orange
        show:
          legend_value: true
          in_header: true
          in_chart: false
      - entity: sensor.solcast_pv_forecast_forecast_today
        yaxis_id: header_only
        name: Today Forecast
        color: Grey
