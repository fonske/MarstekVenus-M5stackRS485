type: masonry
path: zonneplan
title: Dynamisch
icon: mdi:chart-areaspline
cards:
  - type: custom:plotly-graph
    hours_to_show: 20
    refresh_interval: 600
    time_offset: 18h
    disable_pinch_to_zoom: true
    fn: |
      $fn ({ hass, vars, getFromConfig }) => {
        const hours_to_show = getFromConfig('hours_to_show');
        const time_offset = parseInt(getFromConfig('time_offset'));
        vars.x = []; vars.y = []; vars.color = []; vars.hover = []
        vars.min = {p: 999,t: null}; 
        vars.max = {p:-999,t:null};
        vars.ymin = 999; 
        vars.ymax = -999;
        vars.unit_of_measurement = hass.states['sensor.zonneplan_current_electricity_tariff'].attributes.unit_of_measurement
        vars.now = {t: Date.now(), p: parseFloat(hass.states['sensor.zonneplan_current_electricity_tariff'].state)} 
        vars.now.h = "<b>" + vars.now.p.toFixed(3) + "</b> " + vars.unit_of_measurement + " @now " 
        vars.avg = { p: 0, c: 0 }
        let start = new Date();
        start.setHours(start.getHours() - (hours_to_show - time_offset));
        let end = new Date();
        end.setHours(start.getHours() + hours_to_show - 1);
        hass.states['sensor.zonneplan_current_electricity_tariff']?.attributes?.forecast?.map(e => {
          if (start >= new Date(e.datetime) || end <  new Date(e.datetime)) return;
          var t = new Date(e.datetime).getTime()+1800000 
          var p = e.electricity_price/10000000
          vars.avg.p += p
          vars.avg.c++
          var c = e.tariff_group.replace("low", "#00a964").replace("normal", "#365651").replace("high","#ed5e18")
          if (t>=Date.now()-1800000) {
            if (p<vars.min.p) vars.min = {p,t,c}
            if (p>vars.max.p) vars.max = {p,t,c}
          }
          
          if (p<vars.ymin) vars.ymin = p
          if (p>vars.ymax) vars.ymax = p
          vars.x.push(t)
          vars.y.push(p)
          vars.color.push(c)
          vars.hover.push(String(new Date(t).getHours()).padStart(2,"0") + "-" + 
            String(new Date((new Date(t).getTime()+3600000)).getHours()).padStart(2,"0") + ": <b>" + 
            p.toFixed(3) + "</b> " + vars.unit_of_measurement)
        })
        vars.min.h = "<b>" + vars.min.p.toFixed(3) + "</b> " + vars.unit_of_measurement + " @ " + new Date(vars.min.t).getHours() + ":00"
        vars.max.h = "<b>" + vars.max.p.toFixed(3) + "</b> " + vars.unit_of_measurement + " @ " +  new Date(vars.max.t).getHours() + ":00"
        vars.avg.p = vars.avg.p / vars.avg.c
        vars.avg.h = "<b>" + vars.avg.p.toFixed(3) + "</b> " + vars.unit_of_measurement + " average"
        //console.log(vars, hass.states['sensor.zonneplan_current_electricity_tariff']?.attributes?.forecast);
      }
    layout:
      margin:
        l: 20
        r: 20
        b: 40
      dragmode: false
      clickmode: none
      legend:
        itemclick: false
        itemdoubleclick: false
      yaxis:
        fixedrange: false
        tickformat: .2f
        range: $fn ({vars}) => [ vars.ymin-0.02, vars.ymax+0.02 ]
        showgrid: false
        visible: false
        showticklabels: true
        showline: false
        title: null
      xaxis:
        tickformat: "%H"
        showgrid: false
        visible: true
        showticklabels: true
        showline: false
        dtick: 3600000
    config:
      displayModeBar: false
      scrollZoom: false
      doubleClick: false
    entities:
      - entity: ""
        unit_of_measurement: $ex vars.unit_of_measurement
        showlegend: false
        x: $ex vars.x
        "y": $ex vars.y
        marker:
          color: $ex vars.color
        type: bar
        hovertemplate: $ex vars.hover
      - entity: ""
        mode: markers
        textposition: top
        showlegend: true
        name: $ex vars.min.h
        hovertemplate: $ex vars.min.h
        yaxis: y0
        marker:
          symbol: diamond
          color: $ex vars.min.c
          opacity: 0.7
        x:
          - $ex vars.min.t
        "y":
          - $ex vars.min.p
      - entity: ""
        mode: markers
        textposition: top
        showlegend: true
        name: $ex vars.max.h
        hovertemplate: $ex vars.max.h
        yaxis: y0
        marker:
          symbol: diamond
          color: $ex vars.max.c
          opacity: 0.7
        x:
          - $ex vars.max.t
        "y":
          - $ex vars.max.p
      - entity: ""
        name: Now
        hovertemplate: Now
        yaxis: y9
        showlegend: false
        line:
          width: 0.5
          color: gray
          opacity: 1
        x: $ex [vars.now.t, vars.now.t]
        "y":
          - 0
          - 1
  - type: vertical-stack
    cards:
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.marstek_m1_battery_state_of_charge
            name: MT1 SOC
            needle: true
            max: 100
            severity:
              green: 66
              yellow: 33
              red: 0
            min: 0
          - type: gauge
            entity: sensor.marstek_m2_battery_state_of_charge
            name: MT2 SOC
            needle: true
            max: 100
            severity:
              green: 66
              yellow: 33
              red: 0
            min: 0
          - type: gauge
            entity: sensor.marstek_m3_battery_state_of_charge
            name: MT3 SOC
            needle: true
            max: 100
            severity:
              green: 66
              yellow: 33
              red: 0
            min: 0
      - type: entities
        entities:
          - entity: input_number.house_target_grid_consumption_in_w
            name: Gewenst P1 vermogen
          - entity: sensor.p1_meter_power
            name: Actueel P1 vermogen
          - entity: sensor.marstek_m1_inverter_state
          - entity: sensor.marstek_m2_inverter_state
          - entity: sensor.marstek_m3_inverter_state
          - entity: sensor.marstek_m1_battery_remaining_capacity
            name: Batterij capaciteit M1
          - entity: sensor.marstek_m2_battery_remaining_capacity
            name: Batterij capaciteit M2
          - entity: sensor.marstek_m3_battery_remaining_capacity
            name: Batterij capaciteit M3
          - entity: sensor.ecodan_heatpump_sww_huidige_temp
            name: SWW huidige temp
          - entity: sensor.marstek_m1_lifetime_round_trip_efficiency
          - entity: sensor.marstek_m2_lifetime_round_trip_efficiency
          - entity: sensor.marstek_m3_lifetime_round_trip_efficiency
  - type: custom:stack-in-card
    cards:
      - type: horizontal-stack
        cards:
          - square: false
            type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Zonneplan
                subtitle: Vandaag
              - type: custom:mushroom-title-card
                title: >
                  € {{ ((states.sensor.zp_electricity_delivery_costs_today.state
                  | float) -
                  (states.sensor.zp_electricity_production_costs_today.state |
                  float)) | round(2) }}
                card_mod:
                  style: |
                    .title {
                      text-align: right;
                      font-size: 40px!important;
                      }
            columns: 2
            style: |
              ha-card {
                border: none;
              }
      - type: horizontal-stack
        cards:
          - square: false
            type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Afname
                subtitle: >-
                  {{ states('sensor.zp_electricity_consumption_today') |
                  round(2)}} kWh  x {{
                  (((states.sensor.zp_electricity_delivery_costs_today.state |
                  float) / (states.sensor.zp_electricity_consumption_today.state
                  | float)) * 100) | round(2) }} ct
                card_mod:
                  style: |
                    .title {
                      font-size: 18px!important;
                      color: rgba(255, 255, 255,0.5)!important;
                      font-weight: 300!important;
                      }
              - type: custom:mushroom-title-card
                title: Teruglevering
                subtitle: >-
                  {{ states ('sensor.zp_electricity_returned_today') | round(2)
                  }} kWh x  {{ (((
                  states.sensor.zp_electricity_production_costs_today.state |
                  float) / (states.sensor.zp_electricity_returned_today.state |
                  float)) * 100) | round(2) }} ct
                card_mod:
                  style: |
                    .title {
                      font-size: 18px!important;
                      color: rgba(255, 255, 255,0.5)!important;
                      text-align: right;
                      font-weight: 300!important;
                      }
                    .subtitle { 
                      text-align: right!important;
                      }
            columns: 2
            style: |
              ha-card {
                border: none;
              }
    card_mod:
      style: |
        ha-card {
          background-color: #00A964;
          --primary-text-color: #FFFFFF;
          --secondary-text-color: #FFFFFF;
          border-radius: 20px;
          padding: 5px 5px;
            }
  - type: custom:plotly-graph
    hours_to_show: 30
    refresh_interval: 60
    time_offset: 27h
    disable_pinch_to_zoom: true
    update_now_every_minute: true
    fn: |
      $fn ({ hass, vars, getFromConfig }) => {

        const hours_to_show = getFromConfig('hours_to_show');
        const time_offset = parseInt(getFromConfig('time_offset'));
        const updateNow = getFromConfig('update_now_every_minute') === true;

        vars.x = [];
        vars.y = [];
        vars.color = [];
        vars.hover = [];

        vars.min = { p: 999, t: null };
        vars.max = { p: -999, t: null };

        vars.ymin = 999;
        vars.ymax = -999;

        vars.unit_of_measurement =
          hass.states['sensor.zonneplan_current_electricity_tariff'].attributes.unit_of_measurement;

        vars.now = {
          t: Date.now(),
          p: parseFloat(hass.states['sensor.zonneplan_current_electricity_tariff'].state)
        };

        // ✅ Live updating of NOW time
        if (updateNow) {
          vars.now.t = Date.now();
        }

        vars.avg = { p: 0, c: 0 };
        vars.thresholds = { low_max: null, normal_max: null };

        let start = new Date();
        start.setHours(start.getHours() - time_offset);

        let end = new Date();
        end.setHours(start.getHours() + hours_to_show);

        hass.states['sensor.zonneplan_current_electricity_tariff']?.attributes?.forecast?.map(e => {

          const forecastTime = new Date(e.datetime).getTime();
          if (start >= new Date(e.datetime) || end < new Date(e.datetime)) return;

          var t = forecastTime + 1800000;
          var p = e.electricity_price / 10000000;

          vars.avg.p += p;
          vars.avg.c++;

          var c = e.tariff_group
            .replace("low", "#00a964")
            .replace("normal", "#FFD700")
            .replace("high", "#FF2E2E");

          if (e.tariff_group === "low") {
            if (vars.thresholds.low_max === null || p > vars.thresholds.low_max)
              vars.thresholds.low_max = p;
          } else if (e.tariff_group === "normal") {
            if (vars.thresholds.normal_max === null || p > vars.thresholds.normal_max)
              vars.thresholds.normal_max = p;
          }

          if (forecastTime > Date.now()) {
            if (p < vars.min.p) vars.min = { p, t, c };
            if (p > vars.max.p) vars.max = { p, t, c };
          }

          if (p < vars.ymin) vars.ymin = p;
          if (p > vars.ymax) vars.ymax = p;

          vars.x.push(t);
          vars.y.push(p);
          vars.color.push(c);

          vars.hover.push(
            "<b>" +
            String(new Date(t).getHours()).padStart(2, "0") + "-" +
            String(new Date(t + 3600000).getHours()).padStart(2, "0") +
            ": " + p.toFixed(3) + " " + vars.unit_of_measurement +
            "</b>"
          );
        });

        if (vars.thresholds.low_max === null) vars.thresholds.low_max = vars.ymin;
        if (vars.thresholds.normal_max === null)
          vars.thresholds.normal_max =
            vars.thresholds.low_max + (vars.ymax - vars.thresholds.low_max) / 2;

        vars.priceColor = (p) => {
          const lowMax = vars.thresholds.low_max;
          const normalMax = vars.thresholds.normal_max;
          if (p <= lowMax) return "#00a964";
          if (p <= normalMax) return "#FFD700";
          return "#FF2E2E";
        };

        vars.min.h =
          "<b>" + vars.min.p.toFixed(3) + " " + vars.unit_of_measurement +
          " @ " + new Date(vars.min.t).getHours() + ":00</b>";

        vars.max.h =
          "<b>" + vars.max.p.toFixed(3) + " " + vars.unit_of_measurement +
          " @ " + new Date(vars.max.t).getHours() + ":00</b>";

        vars.avg.p = vars.avg.p / vars.avg.c;
        vars.avg.h =
          "<b>" + vars.avg.p.toFixed(3) + " " + vars.unit_of_measurement + " average</b>";

        // ✅ Determine NOW color FIRST
        let tg = hass.states['sensor.zonneplan_current_electricity_tariff']?.attributes?.tariff_group;

        if (tg) {
          vars.now.c = tg
            .replace("low", "#00a964")
            .replace("normal", "#FFD700")
            .replace("high", "#FF2E2E");
        } else {
          let currentForecast =
            hass.states['sensor.zonneplan_current_electricity_tariff']?.attributes?.forecast?.find(e => {
              let t = new Date(e.datetime).getTime();
              return vars.now.t >= t && vars.now.t < t + 3600000;
            });

          vars.now.c = currentForecast
            ? currentForecast.tariff_group
                .replace("low", "#00a964")
                .replace("normal", "#FFD700")
                .replace("high", "#FF2E2E")
            : "#000000";
        }

        // ✅ NOW label created AFTER color is known
        vars.now.h =
          `<span style="color:${vars.now.c}"><b>${vars.now.p.toFixed(3)} ${vars.unit_of_measurement} @ ${new Date(vars.now.t).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}</b></span>`;
      }
    layout:
      margin:
        l: 55
        r: 10
        b: 40
        t: 40
      dragmode: false
      clickmode: none
      legend:
        itemclick: false
        itemdoubleclick: false
      yaxis:
        fixedrange: false
        showgrid: true
        visible: true
        showticklabels: true
        showline: true
        title: ""
        tickvals: |-
          $fn ({vars}) => {
            const ticks = [];
            const start = Math.floor(vars.ymin * 100) / 100;
            const end = Math.ceil(vars.ymax * 100) / 100;
            for (let p = start; p <= end + 0.0001; p += 0.01)
              ticks.push(Number(p.toFixed(2)));
            return ticks;
          }
        ticktext: |-
          $fn ({vars}) => {
            const ticks = [];
            const start = Math.floor(vars.ymin * 100) / 100;
            const end = Math.ceil(vars.ymax * 100) / 100;
            for (let p = start; p <= end + 0.0001; p += 0.01) {
              const price = Number(p.toFixed(2));
              const c = vars.priceColor(price);
              ticks.push(`<span style="color:${c}">${price.toFixed(2)}</span>`);
            }
            return ticks;
          }
        range: $fn ({vars}) => [ Math.max(0, vars.ymin - 0.02), vars.ymax + 0.02 ]
      xaxis:
        tickformat: "%H"
        showgrid: false
        visible: true
        showticklabels: true
        showline: false
        dtick: 3600000
      annotations:
        - x: -0.12
          "y": -0.02
          xref: paper
          yref: paper
          text: <b>€/kWh</b>
          showarrow: false
          font:
            size: 10
            color: "#CCCCCC"
          xanchor: left
          yanchor: bottom
    config:
      displayModeBar: false
      scrollZoom: false
      doubleClick: false
    entities:
      - entity: ""
        unit_of_measurement: $ex vars.unit_of_measurement
        showlegend: false
        x: $ex vars.x
        "y": $ex vars.y
        marker:
          color: $ex vars.color
        type: bar
        hovertemplate: $ex vars.hover
      - entity: ""
        mode: markers
        showlegend: true
        name: $ex vars.min.h
        hovertemplate: $ex vars.min.h
        yaxis: y0
        marker:
          symbol: diamond
          size: 10
          color: $ex vars.min.c
          cliponaxis: false
          yanchor: bottom
        x:
          - $ex vars.min.t
        "y":
          - $ex vars.min.p
      - entity: ""
        mode: markers
        showlegend: true
        name: $ex vars.max.h
        hovertemplate: $ex vars.max.h
        yaxis: y0
        marker:
          symbol: diamond
          size: 10
          color: $ex vars.max.c
          cliponaxis: false
          yanchor: bottom
        x:
          - $ex vars.max.t
        "y":
          - $ex vars.max.p
      - entity: ""
        showlegend: false
        yaxis: y0
        layer: above
        line:
          width: 2
          dash: dash
          color: $ex vars.now.c
        x: $ex [vars.now.t, vars.now.t]
        "y":
          - $ex vars.ymin
          - $ex (vars.ymax + 0.01)
        mode: lines
      - entity: ""
        name: $ex vars.now.h
        hovertemplate: $ex vars.now.h
        showlegend: false
        yaxis: y0
        layer: above
        x:
          - $ex vars.now.t
        "y":
          - $ex (vars.ymax + 0.01)
        mode: text
        text:
          - $ex vars.now.h
        textposition: top right
        textoffset: 3
        textfont:
          color: $ex vars.now.c
  - type: custom:apexcharts-card
    update_interval: 1min
    apex_config:
      chart:
        foreColor: rgb(117, 117, 117)
        height: 335px
    graph_span: 16h
    span:
      start: day
      offset: +5h
    header:
      show: true
      title: Zonne-opwek met voorspelling (Solcast)
      standard_format: false
      show_states: true
    series:
      - entity: sensor.sma_totaal
        color: var(--energy-solar-color)
        name: Zonne-opwek 30 Minuten Gemiddeld
        curve: smooth
        type: area
        opacity: 0.4
        float_precision: 2
        stroke_width: 2
        group_by:
          func: avg
          duration: 30min
          fill: zero
        extend_to: false
        show:
          in_header: false
          legend_value: true
      - entity: sensor.solcast_pv_forecast_forecast_today
        unit: W
        curve: smooth
        name: Voorspelling
        color: rgb(100, 100, 100)
        data_generator: |
          return entity.attributes.detailedForecast.map((entry) => {
            return [new Date(entry.period_start).getTime(), entry.pv_estimate*1000];
          });
        stroke_width: 3
        group_by:
          func: max
        show:
          in_header: false
          legend_value: true
      - entity: sensor.sma_totaal
        name: Actueel vermogen
        show:
          in_chart: false
          in_header: true
          legend_value: true
  - type: custom:apexcharts-card
    graph_span: 35h
    span:
      start: hour
      offset: "-2h"
    header:
      show: false
    stacked: true
    apex_config:
      chart:
        height: 260
        fontFamily: inherit
      legend:
        show: false
      tooltip:
        shared: false
        x:
          format: d MMM, HH:00
        "y":
          formatter: |
            EVAL:function(value) {
              return value.toFixed(1).replace('.', ',') + " ct";
            }
      plotOptions:
        bar:
          borderRadius: 5
          columnWidth: 70%
      grid:
        borderColor: rgba(0,0,0,0.06)
        strokeDashArray: 0
        xaxis:
          lines:
            show: false
        yaxis:
          lines:
            show: true
      dataLabels:
        style:
          fontSize: 13px
          fontWeight: bold
        background:
          enabled: true
          borderWidth: 0
          borderRadius: 6
          dropShadow:
            enabled: false
        formatter: |
          EVAL:function(value) { 
            if (value === null || typeof value === 'undefined') return "";
            return Math.round(value) + " ct"; 
          }
      xaxis:
        labels:
          format: HH
          style:
            colors: "#a0a0a0"
            fontSize: 13px
        axisBorder:
          show: false
        axisTicks:
          show: false
        tooltip:
          enabled: false
      yaxis:
        labels:
          formatter: |
            EVAL:function(value) { return Math.round(value); }
          style:
            colors: "#a0a0a0"
            fontSize: 13px
      annotations:
        xaxis:
          - x: EVAL:new Date().setHours(24,0,0,0)
            strokeDashArray: 0
            borderColor: "#e0e0e0"
            borderWidth: 1
            label:
              text: morgen
              borderWidth: 0
              orientation: horizontal
              offsetY: -9
              style:
                color: "#a0a0a0"
                background: transparent
                fontSize: 13px
        points:
          - x: EVAL:new Date().setMinutes(0,0,0)
            "y": >-
              EVAL:(parseFloat(document.querySelector('home-assistant')?.hass?.states['sensor.zonneplan_current_electricity_tariff']?.state
              || 0) * 100)
            marker:
              size: 0
            label:
              text: ▼
              borderWidth: 0
              offsetY: 5
              style:
                color: "#888888"
                background: transparent
                fontSize: 20px
    series:
      - entity: sensor.zonneplan_current_electricity_tariff
        name: Tarief
        type: column
        color: "#e0e0e0"
        show:
          datalabels: false
        data_generator: |
          const currentHourStart = new Date().setMinutes(0,0,0);
          return entity.attributes.forecast.map((e) => {
            const t = new Date(e.datetime).getTime();
            const p = (e.electricity_price / 10000000) * 100;
            return t < currentHourStart ? [t, p] : [t, null];
          });
      - entity: sensor.zonneplan_current_electricity_tariff
        name: Tarief
        type: column
        color: "#3de385"
        show:
          datalabels: false
        data_generator: |
          const currentHourStart = new Date().setMinutes(0,0,0);
          return entity.attributes.forecast.map((e) => {
            const t = new Date(e.datetime).getTime();
            const p = (e.electricity_price / 10000000) * 100;
            const isLow = e.tariff_group.includes("low") || p < 0;
            return (t >= currentHourStart && isLow) ? [t, p] : [t, null];
          });
      - entity: sensor.zonneplan_current_electricity_tariff
        name: Tarief
        type: column
        color: "#00a964"
        show:
          datalabels: false
        data_generator: |
          const currentHourStart = new Date().setMinutes(0,0,0);
          return entity.attributes.forecast.map((e) => {
            const t = new Date(e.datetime).getTime();
            const p = (e.electricity_price / 10000000) * 100;
            const isLow = e.tariff_group.includes("low") || p < 0;
            return (t >= currentHourStart && !isLow) ? [t, p] : [t, null];
          });
      - entity: sensor.zonneplan_current_electricity_tariff
        name: Max
        type: line
        color: "#00a964"
        show:
          datalabels: true
        data_generator: |
          const now = Date.now() - 3600000; 
          let max = {t: null, p: -999};
          entity.attributes.forecast.forEach(e => {
            const t = new Date(e.datetime).getTime();
            const p = (e.electricity_price / 10000000) * 100;
            if (t >= now && p > max.p) max = {t, p};
          });
          return entity.attributes.forecast.map(e => {
             const t = new Date(e.datetime).getTime();
             return (t === max.t) ? [t, max.p] : [t, null];
          });
      - entity: sensor.zonneplan_current_electricity_tariff
        name: Min
        type: line
        color: "#3de385"
        show:
          datalabels: true
        data_generator: |
          const now = Date.now() - 3600000; 
          let min = {t: null, p: 999};
          entity.attributes.forecast.forEach(e => {
            const t = new Date(e.datetime).getTime();
            const p = (e.electricity_price / 10000000) * 100;
            if (t >= now && p < min.p) min = {t, p};
          });
          return entity.attributes.forecast.map(e => {
             const t = new Date(e.datetime).getTime();
             return (t === min.t) ? [t, min.p] : [t, null];
          });
  - type: custom:apexcharts-card
